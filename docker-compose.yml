version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-folga}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-folga123}
      POSTGRES_DB: ${DB_NAME:-folgahub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-folga}:${DB_PASSWORD:-folga123}@db:5432/${DB_NAME:-folgahub}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}
      AZURE_DI_ENDPOINT: ${AZURE_DI_ENDPOINT}
      AZURE_DI_KEY: ${AZURE_DI_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
